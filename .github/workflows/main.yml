name: Build Fabric Mod (Safe)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Use Gradle wrapper if available
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
          echo "Using Gradle wrapper"
          export GRADLE_CMD=./gradlew
        else
          echo "Gradle wrapper not found, using system gradle"
          sudo apt-get update
          sudo apt-get install -y gradle
          export GRADLE_CMD=gradle
        fi
        echo "GRADLE_CMD=$GRADLE_CMD" >> $GITHUB_ENV

    - name: Build mod
      run: $GRADLE_CMD build

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: mod-jar
        path: build/libs/*.jar
